<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Curl Moving</title>
    <meta name="description" content="Thank you for contacting Curl Moving. We'll get back to you shortly.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { background: #1e3a5f; color: white; padding: 1rem 0; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; text-decoration: none; color: white; }
        .logo span { color: #4a9eff; }
        
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 20px; background: #f8f9fa; }
        .thank-you-card { background: white; padding: 3rem; border-radius: 16px; text-align: center; max-width: 500px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .checkmark { width: 80px; height: 80px; background: #27ae60; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; font-size: 2.5rem; color: white; }
        .thank-you-card h1 { color: #1e3a5f; margin-bottom: 1rem; }
        .thank-you-card p { color: #666; margin-bottom: 1.5rem; }
        .contact-info { background: #f8f9fa; padding: 1.5rem; border-radius: 8px; margin: 1.5rem 0; }
        .contact-info p { margin: 0; font-size: 1.1rem; }
        .contact-info a { color: #e74c3c; font-weight: bold; text-decoration: none; }
        .back-link { display: inline-block; background: #1e3a5f; color: white; padding: 1rem 2rem; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 1rem; }
        .back-link:hover { background: #2c5282; }
        
        footer { background: #1a1a2e; color: white; padding: 1.5rem 0; text-align: center; }
        footer a { color: #4a9eff; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">Curl<span>Moving</span></a>
        </div>
    </header>

    <main>
        <div class="thank-you-card">
            <div class="checkmark">✓</div>
            <h1>Thank You!</h1>
            <p>Your quote request has been received. I'll get back to you as soon as possible - usually within a few hours.</p>
            
            <div class="contact-info">
                <p>Need a faster response? Text or call:</p>
                <p><a href="tel:+16029354209">(602) 935-4209</a></p>
            </div>
            
            <p style="font-size: 0.9rem; color: #888;">Text is the fastest way to reach me!</p>
            
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Curl Moving | Gilbert, Arizona | <a href="tel:+16029354209">(602) 935-4209</a></p>
        </div>
    </footer>
</body>
</html>
